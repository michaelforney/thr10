if { [info exists CHIPNAME] } {
	set _CHIPNAME $CHIPNAME
} else {
	set _CHIPNAME ssp2
}

if { [info exists CPUTAPID] } {
	set _CPUTAPID $CPUTAPID
} else {
	set _CPUTAPID 0x4F1F0F0F
}

transport select jtag

jtag newtap $_CHIPNAME cpu -irlen 4 -expected-id $_CPUTAPID -ircapture 0x1 -irmask 0xF

set _TARGETNAME $_CHIPNAME.cpu
target create $_TARGETNAME arm7tdmi -chain-position $_TARGETNAME -endian big
$_TARGETNAME configure -work-area-phys 0x1000000 -work-area-size 0x8000

arm7_9 fast_memory_access enable
arm7_9 dcc_downloads enable

adapter speed 2000

adapter srst delay 100
jtag_ntrst_delay 100

reset_config trst_and_srst