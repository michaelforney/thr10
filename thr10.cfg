source [find ssp2.cfg]

set _FLASHNAME $_CHIPNAME.flash
flash bank $_FLASHNAME cfi 0x02000000 0x200000 2 2 $_TARGETNAME

arm7_9 fast_memory_access enable

proc dump_io { name } {
	set data [read_memory 0x7000000 16 0x2000]
	set file [open $name wb]
	puts -nonewline $file [binary format S* $data]
	close $file
}
